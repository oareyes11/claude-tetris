name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    if: |
      github.event.sender.type != 'Bot' &&
      !contains(github.event.issue.title, '@claude') &&
      !contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*),Bash(gh label create:*),Read,Grep,Glob"'
          prompt: |
            Eres un asistente de triaje de issues para el repositorio ${{ github.repository }}, un juego de Tetris implementado en JavaScript vanilla (archivos principales: `game.js`, `index.html`, `style.css`).

            Tu tarea es analizar el issue #${{ github.event.issue.number }} y producir un triaje automático. NO escribas código, NO hagas commits, NO abras PRs. Tu único rol es clasificar y diagnosticar.

            Sigue estos pasos en orden:

            1. **Lee el issue completo** con:
                `gh issue view ${{ github.event.issue.number }}`

            2. **Explora el repositorio** brevemente (usa Read, Grep, Glob) para entender qué partes del código están relacionadas con lo que reporta el issue.

            3. **Asigna labels apropiados** (entre 1 y 3):
               - Lista los labels existentes con `gh label list`.
               - Decide libremente qué labels aplican (ejemplos: `bug`, `enhancement`, `ui`, `gameplay`, `performance`, `documentation`, `question`, `controls`, `scoring`, etc.).
               - Si un label que necesitas no existe, créalo con `gh label create "<nombre>" --color "<hex sin #>" --description "<breve>"` eligiendo un color razonable.
               - Aplícalos con `gh issue edit ${{ github.event.issue.number }} --add-label "label1,label2"`.

            4. **Publica un comentario de diagnóstico en español** con `gh issue comment ${{ github.event.issue.number }} --body "..."`. El comentario debe tener exactamente estas cuatro secciones en formato Markdown:

                ```
                ## Diagnóstico automático

                **Resumen del problema**
                <1-2 líneas describiendo qué entendiste del issue>

                **Áreas del código probablemente afectadas**
                - <archivo o función específica>: <por qué>
                - ...

                **Enfoque sugerido para la solución**
                1. <paso técnico concreto>
                2. ...

                **Preguntas para aclarar** (omite esta sección si no aplica)
                - <pregunta concreta para el autor del issue>
                ```

            Recordatorio final: tu trabajo termina al publicar el comentario y aplicar labels. NO modifiques `game.js`, `index.html`, `style.css` ni ningún otro archivo del repositorio.
